services:
  llm-agent:
    build: .
    container_name: llm-agent-ollama
    restart: unless-stopped
    ports:
      - "${PORT:-4004}:4004"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - MCP_SERVER_URL=${MCP_SERVER_URL:-http://host.docker.internal:3001/mcp/stream/http}
      - MCP_ENABLED=${MCP_ENABLED:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
