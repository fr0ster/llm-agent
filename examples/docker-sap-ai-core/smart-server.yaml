port: 8010
host: 0.0.0.0
mode: smart

# Plugins auto-loaded from ./plugins (WORKDIR=/app → /app/plugins)

# Skills: filesystem-based skill discovery (SKILL.md per subdirectory)
skills:
  type: filesystem
  dirs:
    - /app/skills

# Multi-model pipeline: separate LLMs for main work, classification, and helper tasks
# Provider & model configured via LLM_PROVIDER and LLM_MODEL_NAME env vars
# Supported providers: sap-ai-sdk, openai, and any custom provider plugin
pipeline:
  llm:
    main:
      provider: ${LLM_PROVIDER}
      model: ${LLM_MODEL_NAME}
      temperature: 0.7
      maxTokens: 32768
    classifier:
      provider: ${LLM_PROVIDER}
      model: ${LLM_CLASSIFIER_MODEL:-gpt-4.1-mini}
      temperature: 0.1
      maxTokens: 2048
    helper:
      provider: ${LLM_PROVIDER}
      model: ${LLM_HELPER_MODEL:-gpt-4.1-mini}
      temperature: 0.1
      maxTokens: 2048

  # Consumer-defined RAG stores (v3.0.0)
  rag:
    tools:
      type: qdrant
      embedder: ${RAG_EMBEDDER}
      url: ${QDRANT_URL}
      model: ${EMBEDDING_MODEL}
      collectionName: mcp_tools
      vectorWeight: 0.7
      keywordWeight: 0.3
    facts:
      type: qdrant
      embedder: ${RAG_EMBEDDER}
      url: ${QDRANT_URL}
      model: ${EMBEDDING_MODEL}
      collectionName: experience_facts
      dedupThreshold: 0.92
      vectorWeight: 0.7
      keywordWeight: 0.3
    feedback:
      type: qdrant
      embedder: ${RAG_EMBEDDER}
      url: ${QDRANT_URL}
      model: ${EMBEDDING_MODEL}
      collectionName: experience_feedback
      dedupThreshold: 0.92
      vectorWeight: 0.7
      keywordWeight: 0.3
    state:
      type: qdrant
      embedder: ${RAG_EMBEDDER}
      url: ${QDRANT_URL}
      model: ${EMBEDDING_MODEL}
      collectionName: experience_state
      dedupThreshold: 0.92
      vectorWeight: 0.7
      keywordWeight: 0.3
    demo_literature:
      type: qdrant
      embedder: ${RAG_EMBEDDER}
      url: ${QDRANT_URL}
      model: ${EMBEDDING_MODEL}
      collectionName: demo_literature
      vectorWeight: 0.7
      keywordWeight: 0.3
    demo_news:
      type: qdrant
      embedder: ${RAG_EMBEDDER}
      url: ${QDRANT_URL}
      model: ${EMBEDDING_MODEL}
      collectionName: demo_news
      vectorWeight: 0.7
      keywordWeight: 0.3
    demo_sap_cases:
      type: qdrant
      embedder: ${RAG_EMBEDDER}
      url: ${QDRANT_URL}
      model: ${EMBEDDING_MODEL}
      collectionName: demo_sap_cases
      vectorWeight: 0.7
      keywordWeight: 0.3

  # Default flow (no pipeline.stages) — llm-agent's hardcoded flow handles:
  # classification, RAG query (all stores), tool selection, reranking, assembly,
  # tool-loop, and client adapter wrapping (ClineClientAdapter) automatically.
  # This is more robust for OpenAI protocol clients (Cline, Goose, etc.)
  # than the structured pipeline, which extracts inputText separately.

# MCP: YAML-based config enables auto-vectorization of tools into RAG
# (plugin mcpClients skip vectorization per builder.js)
mcp:
  type: http
  url: ${MCP_SERVER_URL}
  headers:
    Accept: "application/json, text/event-stream"

logDir: /app/sessions

# Custom classifier prompt: classify knowledge questions as "action" so RAG is triggered.
# Upstream issue: ragRetrievalMode=always still skips RAG for non-action types.
prompts:
  # System prompt preamble — injected before all LLM calls
  system: >
    Use MCP tools when they can accomplish the task. Answer or fulfill requests when possible.
    When an action is impossible with available tools — say so and do not attempt it.

  # RAG query translation — strict translation without LLM commentary (fr0ster/llm-agent#26)
  ragTranslate: >
    Translate the following text to English for vector search.
    Output ONLY the translated text — no explanations, no commentary,
    no opinions about feasibility. Preserve all technical terms, class names,
    and identifiers exactly as they appear.

  classifier: >
    You are a Semantic Intent Analyzer. Decompose the user message into logical tasks.
    For each task, identify:
      - "type": chat (greetings/math), action (tasks AND knowledge/fact questions), state (context), feedback.
      - "text": the actual task description.
      - "context": the domain of the task (e.g., "sap-abap", "math", "general").
      - "dependency": "independent", "sequential" (must run after previous action), or an ID of a subprompt this one depends on.

    CRITICAL RULES:
    1. If a message contains multiple sequential steps (e.g., "Do A and then check B"), SPLIT them into separate "action" subprompts with "dependency": "sequential" on the later steps.
    2. If tasks are independent (e.g., "Check weather AND add 5+5"), SPLIT them with "dependency": "independent".
    3. If a task is an atomic operation with a conditional fallback (e.g., "Do A, if it fails do B"), keep it as a SINGLE subprompt — the fallback is part of the same instruction.
    4. Be strictly neutral. Only assign "sap-abap" context if SAP terms are present.
    5. IMPORTANT: Knowledge/factual questions (who, what, when, where, why, how) MUST be classified as "action" — NOT "fact". This ensures the RAG pipeline retrieves relevant context.

    Example: "Read table T100 and check its transport history. Also tell me a joke."
    Result: [
      {"type": "action", "text": "Read content of table T100", "context": "sap-abap", "dependency": "independent"},
      {"type": "action", "text": "Check transport history of table T100", "context": "sap-abap", "dependency": "sequential"},
      {"type": "chat", "text": "Tell a joke", "context": "general", "dependency": "independent"}
    ]

    Example: "Who won the Super Bowl in 2026?"
    Result: [
      {"type": "action", "text": "Who won the Super Bowl in 2026?", "context": "general", "dependency": "independent"}
    ]

    Return ONLY a JSON array.

agent:
  externalToolsValidationMode: permissive
  maxIterations: 10
  maxToolCalls: 30
  toolUnavailableTtlMs: 600000
  toolResultCacheTtlMs: 300000
  ragRetrievalMode: always
  ragQueryK: 5
  # v5.18.0: keep last N client messages in LLM context (older available via RAG)
  historyRecencyWindow: 4
  showReasoning: false
  historyAutoSummarizeLimit: 10
  queryExpansionEnabled: false
  ragTranslationEnabled: true
  # Keep RAG-selected tools (5-6) across iterations instead of refreshing all 139 MCP tools
  refreshToolsPerIteration: false
  # Re-run RAG tool selection on error iterations for context-aware tool discovery
  toolReselectPerIteration: true
  # SAP AI Core Orchestration requires non-streaming for tool-use (SSE errors on stream)
  llmCallStrategy: non-streaming
  # v3.4.0: buffer intermediate tool-loop output, stream only final response (#21)
  streamMode: final
  reportUsage: true
  # v5.18.2: health check timeout — SAP AI Core needs >5s for LLM probe (#71)
  healthTimeoutMs: 15000
  # v3.4.0: retry with exponential backoff on 429/5xx (#20)
  retry:
    maxAttempts: 3
    backoffMs: 2000
    retryOn: [429, 500, 502, 503]
