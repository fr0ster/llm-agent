services:
  postgres:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229  # postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: skills
    ports:
      - "${PG_TEST_PORT:-5432}:5432"
    volumes:
      - ./pg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d skills"]
      interval: 2s
      timeout: 3s
      retries: 30

  qdrant:
    image: qdrant/qdrant:v1.12.4@sha256:241edb9d7778327516ef218f8c74e1bd61b5ea42cd4f193cb8d0896199705636  # qdrant/qdrant:v1.12.4
    ports:
      - "${QDRANT_TEST_PORT:-6333}:6333"
    healthcheck:
      # The qdrant image has bash but no curl/wget; probe the REST port over a
      # bash /dev/tcp redirection.
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  ollama:
    build:
      context: .
      dockerfile: ollama.Dockerfile
    ports:
      - "${OLLAMA_TEST_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
