# Structured pipeline — multi-model with Qdrant RAG.
# Combines separate LLM models for different tasks with explicit stage control.
#
# - Main LLM: OpenAI GPT-4o (creative, high temperature)
# - Classifier/Helper: DeepSeek (cheap, low temperature)
# - Tools RAG: Qdrant + OpenAI embeddings (for tool/skill selection)
# - Custom tool-loop config: higher iteration/tool limits
#
# Usage:
#   OPENAI_API_KEY=sk-xxx DEEPSEEK_API_KEY=sk-xxx \
#     npm run dev -- --config docs/examples/06-structured-multi-model.yaml

port: 4004
host: 0.0.0.0
mode: smart

pipeline:
  llm:
    main:
      provider: openai
      apiKey: ${OPENAI_API_KEY}
      model: gpt-4o
      temperature: 0.7
    classifier:
      provider: deepseek
      apiKey: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      temperature: 0.1
    helper:
      provider: deepseek
      apiKey: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      temperature: 0.1

  rag:
    tools:
      type: qdrant
      url: http://qdrant:6333
      collectionName: llm-agent-tools
      embedder: openai
      model: text-embedding-3-small
      apiKey: ${OPENAI_API_KEY}

  mcp:
    - type: http
      url: http://localhost:3001/mcp/stream/http

  version: "1"
  stages:
    - id: classify
      type: classify
    - id: summarize
      type: summarize
    - id: rag-retrieval
      type: parallel
      stages:
        - id: rag-tools
          type: rag-query
          config: { store: tools, k: 15 }
      after:
        - id: rerank
          type: rerank
        - id: skill-select
          type: skill-select
        - id: tool-select
          type: tool-select
    - id: assemble
      type: assemble
    - id: tool-loop
      type: tool-loop
      config: { maxIterations: 15, maxToolCalls: 50 }
    - id: history-upsert
      type: history-upsert
