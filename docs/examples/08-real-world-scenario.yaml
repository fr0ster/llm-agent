# Real-world scenario: MCP agent with RAG-based tool selection and semantic history.
#
# How it works:
#
# AT STARTUP:
#   The builder connects to MCP server(s) and vectorizes every tool's name,
#   description, and JSON schema into the `tools` RAG store.
#   Each tool is stored with metadata `{ id: "tool:TOOL_NAME" }`.
#   This allows the agent to select only relevant tools per request
#   instead of flooding the LLM context with the entire tool catalog.
#
# PER REQUEST (flat / DefaultPipeline):
#
#   1. CLASSIFY — the classifier LLM decomposes the user message into
#      typed subprompts:
#        - action:   "read table T100"           → drives the tool loop
#        - chat:     "thanks!"                    → no RAG, just reply
#
#   2. SUMMARIZE — condense conversation history if it exceeds the limit.
#
#   3. RAG RETRIEVAL (parallel):
#        - query tools  → returns MCP tool descriptions + skill descriptions
#        - query history → returns semantic conversation history (if configured)
#
#   4. RERANK — re-score results by relevance to the query.
#
#   5. SKILL/TOOL SELECT — extract tool:XXX and skill:XXX IDs from tools results,
#      select only matching MCP tools and skills for the LLM context.
#
#   6. ASSEMBLE — merge action subprompts + RAG results + selected tools
#      + conversation history into the LLM context.
#
#   7. TOOL LOOP — streaming LLM call. If the LLM requests a tool call,
#      execute it via MCP, append the result, and continue the loop.
#      Streams text chunks to the client in real-time.
#
#   8. HISTORY UPSERT — summarize the turn and upsert to history RAG store.
#
# NOTE: Domain knowledge, user corrections, and session state are consumer
# responsibilities. Implement a custom IPipeline to add those stores.
#
# NOTE: The structured-stages DSL (`pipeline: { version, stages }`) was removed
# in v19. This file now uses the flat pipeline (the default), which runs the same
# DefaultPipeline flow. Omit the `pipeline:` key or set `pipeline: { name: flat }`.
#
# Usage:
#   DEEPSEEK_API_KEY=sk-xxx npm run dev -- --config docs/examples/08-real-world-scenario.yaml

port: 4004
host: 0.0.0.0
mode: smart

llm:
  provider: deepseek
  apiKey: ${DEEPSEEK_API_KEY}
  model: deepseek-chat
  temperature: 0.7
  classifierTemperature: 0.1

rag:
  type: in-memory
  embedder: ollama
  url: http://localhost:11434
  model: bge-m3
  dedupThreshold: 0.92
  vectorWeight: 0.7
  keywordWeight: 0.3

mcp:
  type: http
  url: http://localhost:3001/mcp/stream/http

agent:
  maxIterations: 10
  maxToolCalls: 30
  ragQueryK: 10
  classificationEnabled: true
  queryExpansionEnabled: true
  showReasoning: false
  historyAutoSummarizeLimit: 10
