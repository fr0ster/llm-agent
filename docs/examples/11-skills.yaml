# 11-skills.yaml — Pipeline with Agent Skills support (v19+)
#
# Demonstrates using ISkillManager to discover and inject skills
# into the LLM system prompt alongside MCP tools.
#
# Skills are reusable instruction packages (SKILL.md files) that teach
# the agent HOW to do something. Unlike MCP tools (which provide actions),
# skills provide context, guidelines, and domain knowledge.
#
# NOTE: The structured-stages DSL (`pipeline: { version, stages }`) was removed
# in v19. Skills are loaded and injected automatically by the flat (default)
# pipeline. No explicit stages YAML is needed — just configure `skills:` and the
# flat pipeline handles discover → RAG-index → per-request skill-select → inject.
#
# ── Skill discovery ──
#
# Skills are loaded from directories on disk. Each skill is a subdirectory
# containing a SKILL.md file with optional YAML frontmatter:
#
#   .claude/skills/
#   ├── code-review/
#   │   └── SKILL.md          ← skill content + frontmatter metadata
#   ├── sap-abap/
#   │   ├── SKILL.md
#   │   └── examples/         ← supporting resources (available via ISkill.readResource)
#   │       └── patterns.md
#   └── commit-style/
#       └── SKILL.md
#
# ── SKILL.md format ──
#
#   ---
#   name: code-review
#   description: Guidelines for reviewing pull requests
#   user-invocable: true
#   argument-hint: "<PR number or diff>"
#   ---
#
#   Review the code change with focus on:
#   1. Security vulnerabilities
#   2. Performance regressions
#   3. Test coverage gaps
#
#   Use $ARGUMENTS as the target to review.
#   Reference files are in $CLAUDE_SKILL_DIR/examples/.
#
# ── Three built-in managers ──
#
#   ClaudeSkillManager   — ~/.claude/skills/ + <project>/.claude/skills/
#   CodexSkillManager    — ~/.agents/skills/ + <project>/.agents/skills/
#   FileSystemSkillManager — any custom dirs[]
#
# ── How skills flow through the pipeline ──
#
#   1. STARTUP: SmartAgentBuilder.build() vectorizes each skill into tools RAG:
#        "Skill: code-review\nGuidelines for reviewing pull requests"
#        metadata: { id: "skill:code-review" }
#
#   2. PER REQUEST (flat pipeline):
#        rag-query    → retrieves skill:* and tool:* entries from tools store
#        skill-select → filters skills by RAG matches (skill: prefix)
#                     → loads content via ISkill.getContent()
#                     → writes to ctx.skillContent
#        assemble     → appends ctx.skillContent to system message
#        tool-loop    → LLM sees skill instructions in its context
#
#   Skills are selected the same way as tools — via RAG similarity.
#   If the user asks "review this PR", the RAG query matches
#   "skill:code-review" and that skill's content is injected.
#
# ── Note on skill installation ──
#
#   ISkillManager is read-only discovery. It scans directories that
#   already exist on disk. There is no install/uninstall mechanism —
#   skills are managed externally (git clone, manual copy, etc.).
#
# Usage:
#   # 1. Create a skill directory
#   mkdir -p .claude/skills/code-review
#   cat > .claude/skills/code-review/SKILL.md << 'SKILL'
#   ---
#   name: code-review
#   description: Guidelines for reviewing pull requests
#   ---
#   When reviewing code, check for:
#   1. Security issues (injection, XSS, auth bypass)
#   2. Performance (N+1 queries, missing indexes)
#   3. Error handling (uncaught exceptions, missing retries)
#   SKILL
#
#   # 2. Start the server
#   npm run dev -- --config docs/examples/11-skills.yaml

port: 4004
host: 0.0.0.0
mode: smart

llm:
  provider: deepseek
  apiKey: ${DEEPSEEK_API_KEY}
  model: deepseek-chat
  temperature: 0.7

# Ollama embeddings for semantic skill/tool matching.
# For keyword-only matching without Ollama, omit `embedder` (BM25).
rag:
  type: in-memory
  embedder: ollama
  url: http://localhost:11434
  model: bge-m3

# MCP is optional — uncomment to enable tool discovery alongside skills.
# mcp:
#   type: http
#   url: http://localhost:3001/mcp/stream/http

# Skill discovery — scans directories for SKILL.md files.
# Type: 'claude' (default) | 'codex' | 'filesystem'
#
#   claude:     ~/.claude/skills/ + <projectRoot>/.claude/skills/
#   codex:      ~/.agents/skills/ + <projectRoot>/.agents/skills/
#   filesystem: custom dirs[] only
#
# This example uses 'filesystem' pointing to the bundled test skill.
# For real projects, use 'claude' or 'codex' type instead.
skills:
  type: filesystem
  dirs:
    - docs/examples/skills

agent:
  maxIterations: 10
  maxToolCalls: 30
  ragQueryK: 15
  classificationEnabled: true
