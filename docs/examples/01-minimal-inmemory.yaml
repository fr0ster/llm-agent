# Minimal local start — DeepSeek + in-memory RAG, no MCP.
# Simplest possible setup for quick experimentation.
#
# Usage:
#   DEEPSEEK_API_KEY=sk-xxx npm run dev -- --config docs/examples/01-minimal-inmemory.yaml

port: 4004
host: 0.0.0.0
mode: smart

llm:
  apiKey: ${DEEPSEEK_API_KEY}
  model: deepseek-chat
  temperature: 0.7

rag:
  type: in-memory
