# Coordinator orchestration — DeepSeek-only variant (no SAP AI Core).
# Parent + both sub-agents run on DeepSeek; no MCP. Use this to verify
# the coordinator end-to-end without external SAP dependencies.

port: 4004
mode: smart

llm:
  provider: deepseek
  apiKey: ${DEEPSEEK_API_KEY}
  url: ${DEEPSEEK_ENDPOINT:-https://api.deepseek.com/v1/chat/completions}
  model: ${DEEPSEEK_MODEL:-deepseek-chat}
  temperature: 0.5

pipeline:
  name: linear
  config:
    planning: one-shot
    dispatch: hybrid
    maxSteps: 4
    failPolicy: continue

subagents:
  - name: abap-coder
    description: |
      Writes ABAP source code: reports, classes, function modules.
    config: ../../examples/subagents/abap-coder-deepseek.yaml
  - name: code-reviewer
    description: |
      Reviews ABAP code; returns JSON {"approved": bool, "issues": string[]}.
    config: ../../examples/subagents/code-reviewer-deepseek.yaml
