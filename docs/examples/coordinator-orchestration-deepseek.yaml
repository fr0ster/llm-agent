# Coordinator orchestration — DeepSeek-only variant (no SAP AI Core).
# Parent + both sub-agents run on DeepSeek; no MCP. Use this to verify
# the coordinator end-to-end without external SAP dependencies.

port: 4004
mode: smart

llm:
  apiKey: ${DEEPSEEK_API_KEY}
  endpoint: ${DEEPSEEK_ENDPOINT:-https://api.deepseek.com/v1/chat/completions}
  model: ${DEEPSEEK_MODEL:-deepseek-chat}
  temperature: 0.5

coordinator:
  planning: one-shot
  dispatch: hybrid
  activation: auto
  plannerLlm: main
  maxSteps: 4
  failPolicy: continue

subagents:
  - name: abap-coder
    config: ../../examples/subagents/abap-coder-deepseek.yaml
  - name: code-reviewer
    config: ../../examples/subagents/code-reviewer-deepseek.yaml
