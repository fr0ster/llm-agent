# --- Structured Pipeline (optional) -------------------------------------------
# Replaces DefaultPipeline with a YAML-defined stage tree.
# When absent, DefaultPipeline runs (tools + history stores, no rag-upsert).
#
# pipeline:
#   version: "1"
#   stages:
#     - id: classify
#       type: classify
#     - id: summarize
#       type: summarize
#     - id: rag-retrieval
#       type: parallel
#       stages:
#         - { id: rag-tools, type: rag-query, config: { store: tools, k: 10 } }
#         - { id: rag-history, type: rag-query, config: { store: history, k: 5 } }
#       after:
#         - { id: rerank, type: rerank }
#     - { id: skill-select, type: skill-select }
#     - { id: tool-select, type: tool-select }
#     - id: assemble
#       type: assemble
#     - id: tool-loop
#       type: tool-loop
#     - id: history-upsert
#       type: history-upsert

