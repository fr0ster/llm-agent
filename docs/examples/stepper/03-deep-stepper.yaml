# Deep-Stepper — multi-level recursive mode where each Stepper can itself plan
# and spawn child Steppers, building a recursive execution tree.
#
# Deep-Stepper is the most powerful mode: root plans high-level sub-goals;
# each child planner can further decompose its sub-goal into grandchildren, up
# to maxDepth. Every level shares the same per-session knowledge-RAG blackboard
# so siblings can read each other's artefacts even across recursion levels.
#
# When to use:
#   - Tasks with natural hierarchical structure (system review → component →
#     function-level analysis)
#   - Long-horizon tasks where intermediate findings unlock further questions
#   - Scenarios where the planner cannot foresee all steps upfront
#
# Cost shape:
#   planner    — sonnet at each depth level (depth 0 = root, etc.)
#   executor   — haiku, N calls per leaf step
#   reviewer   — sonnet at depth 0; haiku at depths 1 and 2 (asymmetric policy)
#   finalizer  — sonnet LLM synthesis over the full knowledge-RAG
#
# readOnly policy: trusted — all tools are permitted without confirmation.
# Use this only when the subagent registry contains exclusively safe MCP tools
# (e.g. a read-only SAP system snapshot).

port: ${SMART_SERVER_PORT:-4022}
host: 0.0.0.0
mode: smart

# Provider is env-overridable; defaults to SAP AI Core. To run the whole
# pipeline on another provider set LLM_PROVIDER (+ LLM_API_KEY / LLM_URL) and the
# per-role LLM_*_MODEL vars — keep ONE provider per pipeline (see README).
llm:
  main:
    provider: ${LLM_PROVIDER:-sap-ai-sdk}
    model: ${LLM_MAIN_MODEL:-anthropic--claude-4.6-sonnet}
    apiKey: ${LLM_API_KEY:-}
    url: ${LLM_URL:-}
    resourceGroup: ${SAP_AI_RESOURCE_GROUP:-default}
    temperature: 0.5
  planner:
    provider: ${LLM_PROVIDER:-sap-ai-sdk}
    model: ${LLM_PLANNER_MODEL:-anthropic--claude-4.6-sonnet}
    apiKey: ${LLM_API_KEY:-}
    url: ${LLM_URL:-}
    resourceGroup: ${SAP_AI_RESOURCE_GROUP:-default}
    temperature: 0.3
  executor:
    provider: ${LLM_PROVIDER:-sap-ai-sdk}
    model: ${LLM_EXECUTOR_MODEL:-anthropic--claude-4.5-haiku}
    apiKey: ${LLM_API_KEY:-}
    url: ${LLM_URL:-}
    resourceGroup: ${SAP_AI_RESOURCE_GROUP:-default}
    temperature: 0.2
  reviewer:
    provider: ${LLM_PROVIDER:-sap-ai-sdk}
    model: ${LLM_REVIEWER_MODEL:-anthropic--claude-4.6-sonnet}
    apiKey: ${LLM_API_KEY:-}
    url: ${LLM_URL:-}
    resourceGroup: ${SAP_AI_RESOURCE_GROUP:-default}
    temperature: 0
  finalizer:
    provider: ${LLM_PROVIDER:-sap-ai-sdk}
    model: ${LLM_FINALIZER_MODEL:-anthropic--claude-4.6-sonnet}
    apiKey: ${LLM_API_KEY:-}
    url: ${LLM_URL:-}
    resourceGroup: ${SAP_AI_RESOURCE_GROUP:-default}
    temperature: 0.3

# Embedder provider is env-overridable (DeepSeek/Anthropic have no embedder →
# set EMBEDDER_PROVIDER=ollama|openai). NOTE: `url` here is the Qdrant store URL,
# not the embedder URL.
rag:
  type: qdrant
  embedder: ${EMBEDDER_PROVIDER:-sap-ai-core}
  model: ${EMBEDDING_MODEL:-text-embedding-3-small}
  apiKey: ${EMBEDDER_API_KEY:-}
  resourceGroup: ${SAP_AI_RESOURCE_GROUP:-default}
  url: ${QDRANT_URL:-http://localhost:6333}
  collection: stepper-knowledge

coordinator:
  mode: deep-stepper

  stepper:
    maxParallelSteps: 3          # narrower fan-out: deeper trees need tighter control
    maxDepth: 5                  # up to 5 recursion levels
    tokenBudget: 1000000         # generous budget for deep recursive runs
    reviewer:
      atDepths: [0, 1, 2]        # review root + first two child levels

  # readOnly: trusted — all tools allowed without confirmation.
  # Remove this and set mutationPolicy: confirm + knownReadOnlyTools for stricter policy.
  mutationPolicy: trusted

mcp:
  - type: http
    url: ${MCP_ENDPOINT:-http://localhost:3003/mcp/stream/http}

subagents:
  - name: abap-analyst
    description: |
      Analyzes ABAP repository objects via live SAP MCP tools.
      Used as both a top-level worker and a recursive child Stepper target.
    config: ./worker.yaml

logDir: ./.run/stepper-deep-sessions
log: ./.run/stepper-deep-server.log
