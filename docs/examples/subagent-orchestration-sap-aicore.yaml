# Subagent orchestration — SAP AI Core variant with semantic tool-select.
# Routes parent + sub-agents through SAP AI Core (gpt-4o by default).
# Connects MCP via the local mcp-abap-adt-proxy on http://127.0.0.1:3001.
#
# Prerequisites:
#   1. mcp-abap-adt-proxy running in background:
#        mcp-abap-adt-proxy --config ~/.config/mcp-abap-adt/proxy/epam-sap-mcp.yaml
#   2. AICORE_SERVICE_KEY env variable populated.
#
# Usage:
#   npm run dev -- --config docs/examples/subagent-orchestration-sap-aicore.yaml

port: 4004
host: 0.0.0.0
mode: smart

agent:
  healthTimeoutMs: 15000
  ragQueryK: 10

pipeline:
  llm:
    main:
      provider: sap-ai-sdk
      model: ${SAP_AI_MODEL:-gpt-4o}
      resourceGroup: ${SAP_AI_RESOURCE_GROUP:-default}
      temperature: 0.7
    classifier:
      provider: sap-ai-sdk
      model: ${SAP_AI_MODEL:-gpt-4o}
      resourceGroup: ${SAP_AI_RESOURCE_GROUP:-default}
      temperature: 0.1

  rag:
    tools:
      type: in-memory

  mcp:
    - type: http
      url: ${MCP_ENDPOINT:-http://127.0.0.1:3001/mcp/stream/http}

  version: "1"
  stages:
    - id: classify
      type: classify

    - id: rag-retrieval
      type: parallel
      stages:
        - id: rag-tools
          type: rag-query
          config: { store: tools, k: 10 }
      after:
        - id: tool-select
          type: tool-select

    - id: assemble
      type: assemble

    - id: generate-and-review
      type: repeat
      maxIterations: 3
      until: "ctx.subResults?.review?.includes('\"approved\": true')"
      stages:
        - id: generate-code
          type: subagent
          config:
            agent: abap-coder
            task: |
              {{inputText}}

              Previous attempt (if any):
              {{subResults.code}}

              Reviewer feedback (if any):
              {{subResults.review}}
            outputTo: subResults.code

        - id: review-code
          type: subagent
          config:
            agent: code-reviewer
            task: "Review this ABAP code:\n{{subResults.code}}"
            outputTo: subResults.review

    - id: tool-loop
      type: tool-loop
      config:
        maxIterations: 1

subagents:
  - name: abap-coder
    config: ../../examples/subagents/abap-coder-sap-aicore.yaml
  - name: code-reviewer
    config: ../../examples/subagents/code-reviewer-sap-aicore.yaml
