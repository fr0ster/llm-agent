# Parallel-optimized pipeline — maximizes concurrency for real-world usage.
#
# Key difference from the default sequential flow:
#
#   DEFAULT (04):  classify → summarize → rag-upsert → [translate, expand] → [queries] → ...
#   THIS (09):     classify → parallel { summarize | rag-upsert } → parallel { translate+expand → queries → rerank+tool-select } → ...
#
# What runs in parallel:
#
#   1. After classification, summarize and rag-upsert run SIMULTANEOUSLY.
#      Summarize compresses old history (reads history, writes condensed history).
#      Rag-upsert saves fact/feedback/state subprompts to RAG.
#      These two have zero data dependency on each other.
#
#   2. RAG retrieval block — translate and expand run in parallel
#      (both transform the query text independently),
#      then 3 RAG queries run in parallel (facts/feedback/state),
#      then rerank and tool-select run sequentially (they depend on query results).
#
# Why this is faster:
#   - summarize can take 1-3s (LLM call to condense history)
#   - rag-upsert can take 0.5-2s (3 embedding + upsert calls)
#   - Running them in parallel saves the slower one's entire duration
#
# Usage:
#   DEEPSEEK_API_KEY=sk-xxx npm run dev -- --config docs/examples/09-parallel-optimized.yaml

port: 4004
host: 0.0.0.0
mode: smart

llm:
  apiKey: ${DEEPSEEK_API_KEY}
  model: deepseek-chat
  temperature: 0.7
  classifierTemperature: 0.1

rag:
  type: ollama
  url: http://localhost:11434
  model: nomic-embed-text
  dedupThreshold: 0.92
  vectorWeight: 0.7
  keywordWeight: 0.3

mcp:
  type: http
  url: http://localhost:3001/mcp/stream/http

agent:
  maxIterations: 10
  maxToolCalls: 30
  ragQueryK: 10
  classificationEnabled: true
  ragRetrievalMode: auto
  ragUpsertEnabled: true
  ragTranslationEnabled: true
  queryExpansionEnabled: true
  historyAutoSummarizeLimit: 10

pipeline:
  version: "1"
  stages:
    # ── Step 1: classify (must run first — everything depends on subprompts)
    - id: classify
      type: classify

    # ── Step 2: summarize + rag-upsert IN PARALLEL
    #    No data dependency between them:
    #    - summarize reads history, writes condensed history
    #    - rag-upsert reads subprompts, writes to RAG stores
    - id: post-classify
      type: parallel
      stages:
        - id: summarize
          type: summarize
        - id: rag-upsert
          type: rag-upsert

    # ── Step 3: RAG retrieval (only when context is needed)
    #    translate + expand run in parallel (both transform query text),
    #    then 3 RAG queries run in parallel,
    #    then rerank + tool-select run sequentially
    - id: rag-retrieval
      type: parallel
      when: "shouldRetrieve"
      stages:
        - id: translate
          type: translate
        - id: expand
          type: expand
      after:
        - id: rag-queries
          type: parallel
          stages:
            - id: rag-facts
              type: rag-query
              config: { store: facts, k: 10 }
            - id: rag-feedback
              type: rag-query
              config: { store: feedback, k: 5 }
            - id: rag-state
              type: rag-query
              config: { store: state, k: 5 }
        - id: rerank
          type: rerank
        - id: tool-select
          type: tool-select

    # ── Step 4: assemble LLM context
    - id: assemble
      type: assemble

    # ── Step 5: streaming LLM + tool execution loop
    - id: tool-loop
      type: tool-loop
