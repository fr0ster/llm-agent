port: 3001
host: 0.0.0.0

# smart       — all requests via SmartAgent (RAG tool selection). Best for SAP/ABAP.
# passthrough — all requests directly to LLM (no agent). Preserves Cline XML protocol.
# hybrid      — Cline client → passthrough, others → SmartAgent. (default)
mode: smart

llm:
  apiKey: ${DEEPSEEK_API_KEY}
  model: deepseek-chat
  temperature: 0.7
  classifierTemperature: 0.1

rag:
  provider: ollama                    # openai | ollama | in-memory
  url: http://localhost:11434
  model: nomic-embed-text
  dedupThreshold: 0.92

mcp:
  type: http                          # http | stdio
  url: http://localhost:3000/mcp/stream/http
  # For stdio:
  # type: stdio
  # command: node
  # args: path/to/mcp-server/dist/index.js

agent:
  maxIterations: 10
  maxToolCalls: 30
  ragQueryK: 5
  ragMinScore: 0.55                   # min cosine score to offer a tool to LLM (0 = off)
                                    # nomic-embed-text scores ~0.40 for unrelated pairs — use 0.50+

# prompts:
#   system: "You are a helpful AI assistant. Use tools only for system operations."
#   classifier: null
#   # ragTranslation — translates non-English queries for cross-lingual RAG matching.
#   # MCP tool descriptions are in English, so translation helps non-English users.
#   # Do NOT add domain hints (SAP/printer/etc) — use a neutral translation prompt.
#   # To disable (if using a multilingual embedding model): ragTranslation: ""
#   # ragTranslation: null   # null = use built-in neutral translation prompt

log: smart-server.log                 # path to log file; remove for stdout
