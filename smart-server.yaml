port: 3001
host: 0.0.0.0

# smart       — all requests via SmartAgent (RAG tool selection). Best for SAP/ABAP.
# passthrough — all requests directly to LLM (no agent). Preserves Cline XML protocol.
# hybrid      — Cline client → passthrough, others → SmartAgent. (default)
mode: smart

llm:
  apiKey: ${DEEPSEEK_API_KEY}
  model: deepseek-chat
  temperature: 0.7
  classifierTemperature: 0.1

rag:
  type: ollama                        # ollama | in-memory
  url: http://localhost:11434
  model: nomic-embed-text
  dedupThreshold: 0.92

mcp:
  type: http                          # http | stdio
  url: http://localhost:3000/mcp/stream/http
  # For stdio:
  # type: stdio
  # command: node
  # args: path/to/mcp-server/dist/index.js

agent:
  maxIterations: 10
  maxToolCalls: 30
  ragQueryK: 5

# Optional: customise prompts
# prompts:
#   system: "You are a helpful assistant specialized in SAP ABAP development."
#   classifier: null   # omit or set to null to use the built-in classifier prompt

log: smart-server.log                 # path to log file; remove for stdout
