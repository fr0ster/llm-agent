port: 4004
host: 0.0.0.0
mode: smart

pipeline:
  llm:
    main:
      provider: ${LLM_PROVIDER}
      apiKey: ${LLM_API_KEY}
      model: ${LLM_MODEL}
      temperature: 0.7
      maxTokens: 32768
      credentials:
        clientId: ${AICORE_CLIENT_ID}
        clientSecret: ${AICORE_CLIENT_SECRET}
        tokenServiceUrl: ${AICORE_AUTH_URL}/oauth/token
        servicUrl: ${AICORE_BASE_URL}
    classifier:
      provider: ${LLM_PROVIDER}
      apiKey: ${LLM_API_KEY}
      model: ${LLM_MODEL}
      temperature: 0.1
      credentials:
        clientId: ${AICORE_CLIENT_ID}
        clientSecret: ${AICORE_CLIENT_SECRET}
        tokenServiceUrl: ${AICORE_AUTH_URL}/oauth/token
        servicUrl: ${AICORE_BASE_URL}
    helper:
      provider: ${LLM_PROVIDER}
      apiKey: ${LLM_API_KEY}
      model: ${LLM_MODEL}
      temperature: 0.1
      credentials:
        clientId: ${AICORE_CLIENT_ID}
        clientSecret: ${AICORE_CLIENT_SECRET}
        tokenServiceUrl: ${AICORE_AUTH_URL}/oauth/token
        servicUrl: ${AICORE_BASE_URL}

  mcp:
    - type: http
      url: ${MCP_ENDPOINT}

  rag:
    facts:
      type: in-memory
    feedback:
      type: in-memory
    state:
      type: in-memory

agent:
  externalToolsValidationMode: permissive
  maxIterations: 10
  maxToolCalls: 30
  ragQueryK: 10
  showReasoning: false
  historyAutoSummarizeLimit: 10
  streamMode: final

log: smart-server.log
logDir: sessions
