port: 4004
host: 0.0.0.0
mode: smart

pipeline:
  llm:
    main:
      provider: sap-ai-sdk
      model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
      temperature: 0.7
      maxTokens: 32768
    classifier:
      provider: sap-ai-sdk
      model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
      temperature: 0.1
    helper:
      provider: sap-ai-sdk
      model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
      temperature: 0.1

  mcp:
    - type: http
      url: ${MCP_ENDPOINT}

  rag:
    facts:
      type: in-memory
    feedback:
      type: in-memory
    state:
      type: in-memory

agent:
  externalToolsValidationMode: permissive
  maxIterations: 10
  maxToolCalls: 30
  ragQueryK: 10
  showReasoning: false
  historyAutoSummarizeLimit: 10
  streamMode: final

log: smart-server.log
logDir: sessions
