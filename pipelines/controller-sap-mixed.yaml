# Controller pipeline — SAP/ABAP SPECIALIZATION (gnostic), mixed-model variant.
# SAP/ABAP domain is supplied via per-role `subagents.<role>.hint`; swap the
# hints to retarget another domain, or start from the agnostic `controller.yaml`.
port: 4010
host: 0.0.0.0
mode: smart

# Mixed-model controller: heavy model for the deciding roles (evaluator,
# planner), a lighter model for the executor (which only carries out a single
# fetch step + emits tool calls). Demonstrates per-role model assignment.
llm:
  provider: sap-ai-sdk
  model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
  temperature: 0.7

mcp:
  type: http
  url: ${MCP_ENDPOINT}

rag:
  type: in-memory
  embedder: sap-ai-core
  model: text-embedding-3-small

pipeline:
  name: controller
  config:
    # Per-role `hint` re-specialises the agnostic engine prompts for SAP/ABAP
    # (appended to each role's system prompt). Drop them for a generic controller.
    subagents:
      # Heavy model — goal formulation + planning (the judgment-heavy roles).
      evaluator:
        provider: sap-ai-sdk
        model: ${EVAL_MODEL:-anthropic--claude-4.6-sonnet}
        hint: >-
          The target system is a live SAP/ABAP system reached over ADT/MCP tools.
      planner:
        provider: sap-ai-sdk
        model: ${PLANNER_MODEL:-anthropic--claude-4.6-sonnet}
        hint: >-
          The target system is a live SAP/ABAP system. Facts to fetch include
          DDIC table structures, package contents, ABAP runtime dumps, and
          source code (programs/includes/classes) — always via a tool.
      # Light model — step execution + tool calls (mechanical role).
      # NOTE: claude-3-haiku CANNOT do tools via this AI Core orchestration
      # (rejects the tool `type` field → 400). Use a tool-capable light model;
      # gpt-4o-mini uses the native function format the orchestration accepts.
      executor:
        provider: sap-ai-sdk
        model: ${EXEC_MODEL:-gpt-4o-mini}
        hint: >-
          The target system is a live SAP/ABAP system. System facts include DDIC
          table structures, package contents, ABAP runtime dumps, and source
          code (programs/includes/classes) — obtain each by calling a tool.
    # Planner implementation: adaptive (plan once upfront, replan only on failure).
    # The whole point of mixed-model is to minimise EXPENSIVE planner LLM calls,
    # so adaptive (1 createPlan) beats incremental (a planner call per step).
    planner: ${PLANNER:-adaptive}
    targetState: { strategy: auto, distanceThreshold: 0.7 }
    sessionMemory: { collection: session-memory }
    budgets: { maxSteps: 20, maxRetries: 3, maxRewinds: 5, maxToolCalls: 10 }

log: smart-server.log
logDir: sessions
