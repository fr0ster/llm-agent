port: 4010
host: 0.0.0.0
mode: smart

llm:
  provider: sap-ai-sdk
  model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
  temperature: 0.7

mcp:
  type: http
  url: ${MCP_ENDPOINT}

rag:
  type: in-memory
  embedder: sap-ai-core
  model: text-embedding-3-small

pipeline:
  name: stepper
  config:
    # planned-react: plan upfront then execute (closest peer to the controller's
    # adaptive planner) — for the cross-pipeline comparison.
    mode: ${STEPPER_MODE:-planned-react}

log: smart-server.log
logDir: sessions
