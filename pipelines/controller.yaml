# Controller pipeline — AGNOSTIC (domain-neutral) template.
# The engine's role prompts say "the live target system" and name no domain.
# To specialise for a concrete domain, add a per-role `subagents.<role>.hint`
# (a short "Domain context" preamble appended to that role's system prompt) —
# see `controller-sap.yaml` for a worked SAP/ABAP example.
port: 4010
host: 0.0.0.0
mode: smart

# Base main LLM (flat SmartServerLlmConfig — `provider` required so it is not
# parsed as a multi-model named map). The LLM provider is the inference backend
# and is INDEPENDENT of the target domain; SAP AI Core is used here only as the
# example LLM service. Service key comes from AICORE_SERVICE_KEY in .env.
llm:
  provider: sap-ai-sdk
  model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
  temperature: 0.7

mcp:
  type: http
  url: ${MCP_ENDPOINT}

# The controller's evaluator needs an embedder for distance-based target-state
# strategies (semantic-distance/auto). consumer-confirm needs none.
rag:
  type: in-memory
  embedder: sap-ai-core
  model: text-embedding-3-small

pipeline:
  name: controller
  config:
    # Three opaque subagent roles. Each is a standalone LLM endpoint; they can
    # point at different providers/URLs. No `hint` here ⇒ the prompts stay
    # domain-agnostic. Add `hint:` under a role to specialise it (see
    # controller-sap.yaml). The dynamic counterpart — procedural skills pulled
    # from a RAG collection — is a separate mechanism, not configured via hint.
    subagents:
      evaluator:
        provider: sap-ai-sdk
        model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
      planner:
        provider: sap-ai-sdk
        model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
      executor:
        provider: sap-ai-sdk
        model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
    # Planner implementation: incremental (per-step LLM decision) | adaptive
    # (full plan upfront, replan only on failure/external result).
    planner: ${PLANNER:-incremental}
    # consumer-confirm | semantic-distance | auto. A generous threshold keeps the
    # loop moving instead of asking to confirm the goal on every request.
    targetState: { strategy: auto, distanceThreshold: 0.7 }
    sessionMemory: { collection: session-memory }
    budgets: { maxSteps: 20, maxRetries: 3, maxRewinds: 5, maxToolCalls: 10 }

log: smart-server.log
logDir: sessions
