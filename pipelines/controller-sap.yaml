# Controller pipeline — SAP/ABAP SPECIALIZATION (gnostic).
# Same engine as the agnostic `controller.yaml`, re-specialised for a live
# SAP/ABAP target via per-role `subagents.<role>.hint`. For a different domain,
# copy this file and replace the hints (or start from `controller.yaml`).
port: 4010
host: 0.0.0.0
mode: smart

# Base main LLM (flat SmartServerLlmConfig — `provider` required so it is not
# parsed as a multi-model named map). SAP AI Core service key comes from
# AICORE_SERVICE_KEY in .env.
llm:
  provider: sap-ai-sdk
  model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
  temperature: 0.7

mcp:
  type: http
  url: ${MCP_ENDPOINT}

# The controller's evaluator needs an embedder for distance-based target-state
# strategies (semantic-distance/auto). consumer-confirm needs none.
rag:
  type: in-memory
  embedder: sap-ai-core
  model: text-embedding-3-small

pipeline:
  name: controller
  config:
    # Three opaque subagent roles. Each is a standalone LLM endpoint; here all
    # three use SAP AI Core, but they can point at different providers/URLs.
    #
    # The engine's role prompts are DOMAIN-AGNOSTIC ("the live target system").
    # The optional per-role `hint` re-specialises a role for THIS deployment's
    # domain (here: SAP/ABAP) — it is appended to that role's system prompt. Drop
    # the hints for a generic, domain-neutral controller. The dynamic counterpart
    # — procedural skills pulled from a RAG collection — is a separate mechanism.
    subagents:
      evaluator:
        provider: sap-ai-sdk
        model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
        hint: >-
          The target system is a live SAP/ABAP system reached over ADT/MCP tools.
      planner:
        provider: sap-ai-sdk
        model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
        hint: >-
          The target system is a live SAP/ABAP system. Facts to fetch include
          DDIC table structures, package contents, ABAP runtime dumps, and
          source code (programs/includes/classes) — always via a tool.
      executor:
        provider: sap-ai-sdk
        model: ${LLM_MODEL:-anthropic--claude-4.6-sonnet}
        hint: >-
          The target system is a live SAP/ABAP system. System facts include DDIC
          table structures, package contents, ABAP runtime dumps, and source
          code (programs/includes/classes) — obtain each by calling a tool.
    # Planner implementation: incremental (per-step LLM decision) | adaptive
    # (full plan upfront, replan only on failure/external result).
    planner: ${PLANNER:-incremental}
    # consumer-confirm | semantic-distance | auto. A generous threshold keeps the
    # loop moving instead of asking to confirm the goal on every request.
    targetState: { strategy: auto, distanceThreshold: 0.7 }
    sessionMemory: { collection: session-memory }
    budgets: { maxSteps: 20, maxRetries: 3, maxRewinds: 5, maxToolCalls: 10 }

log: smart-server.log
logDir: sessions
