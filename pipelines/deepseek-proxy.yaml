port: 4004
host: 0.0.0.0
mode: smart

pipeline:
  llm:
    main:
      provider: deepseek
      apiKey: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      temperature: 0.7
      maxTokens: 8192
    classifier:
      provider: deepseek
      apiKey: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      temperature: 0.1
    helper:
      provider: deepseek
      apiKey: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      temperature: 0.1

  mcp:
    - type: http
      url: ${MCP_ENDPOINT:-http://localhost:8080/mcp/stream/http}
      headers:
        x-sap-destination: ${SAP_DESTINATION:-S4HANA_E19}

  rag:
    facts:
      type: in-memory
      embedder: ollama
      url: http://localhost:11434
      model: nomic-embed-text
    feedback:
      type: in-memory
      embedder: ollama
      url: http://localhost:11434
      model: nomic-embed-text
    state:
      type: in-memory
      embedder: ollama
      url: http://localhost:11434
      model: nomic-embed-text

agent:
  externalToolsValidationMode: permissive
  maxIterations: 10
  maxToolCalls: 30
  ragQueryK: 10
  showReasoning: false
  historyAutoSummarizeLimit: 10
  streamMode: final
  refreshToolsPerIteration: false
  toolReselectPerIteration: true

log: smart-server.log
logDir: sessions
