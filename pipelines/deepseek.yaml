port: 4004
host: 0.0.0.0
mode: smart

pipeline:
  llm:
    main:
      provider: deepseek
      apiKey: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      temperature: 0.7
      maxTokens: 8192
    classifier:
      provider: deepseek
      apiKey: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      temperature: 0.1
    helper:
      provider: deepseek
      apiKey: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      temperature: 0.1

  mcp:
    - type: http
      url: ${MCP_ENDPOINT}

  rag:
    facts:
      type: in-memory
    feedback:
      type: in-memory
    state:
      type: in-memory

agent:
  externalToolsValidationMode: permissive
  maxIterations: 10
  maxToolCalls: 30
  ragQueryK: 10
  showReasoning: false
  historyAutoSummarizeLimit: 10
  streamMode: final
  refreshToolsPerIteration: false
  toolReselectPerIteration: true

log: smart-server.log
logDir: sessions
